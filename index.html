<div id="root"><div class="loading-screen"><div class="loading-spinner"></div><p style="font-family:'DM Serif Display',serif;font-size:18px">Loading…</p></div></div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp }           from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
                                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, collection, onSnapshot, setDoc, updateDoc,
         deleteDoc, addDoc, getDoc, serverTimestamp, query, orderBy, limit,
         enableNetwork }
                                   from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── Init ─────────────────────────────────────────────────────
const fbApp  = initializeApp(FIREBASE_CONFIG);
const auth   = getAuth(fbApp);
const db     = getFirestore(fbApp);
// Force network connection (fixes "client is offline" error)
enableNetwork(db).catch(() => {});
const COL_DIR  = collection(db, "directors");
const COL_ACT  = collection(db, "activityLog");
const tDoc     = id => doc(db, "travelData", id);

// ── App State ─────────────────────────────────────────────────
let CU = null, isAdmin = false;
let directors = [], travelData = {}, activityLog = [];
let selDirId = null, viewM = new Date().getMonth(), viewY = new Date().getFullYear();
let curPage = "summary";
let unsubs = [];
let modalSt = {};

// ── Util ─────────────────────────────────────────────────────
const toDS = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const todayDS = () => toDS(new Date());
const dim  = (y,m) => new Date(y,m+1,0).getDate();
const fday = (y,m) => new Date(y,m,1).getDay();
const mLbl = (y,m) => new Date(y,m,1).toLocaleString("default",{month:"long",year:"numeric"});
const fmtD = ds => new Date(ds+"T00:00:00").toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});
const fmtT = ts => { const d=ts?.toDate?ts.toDate():new Date(ts); return d.toLocaleDateString("en-IN",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"}); };
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const toast = (msg,t="success") => { const e=document.getElementById("toast"); e.textContent=(t==="success"?"✓  ":"✕  ")+msg; e.className=`toast ${t} show`; clearTimeout(e._t); e._t=setTimeout(()=>e.classList.remove("show"),3200); };
const esc = s => String(s||"").replace(/'/g,"\\'").replace(/"/g,"&quot;");
const getEntry = (dId,ds) => travelData[dId]?.[ds]||null;

// ── Activity logger ───────────────────────────────────────────
const logAct = (action, details) => addDoc(COL_ACT,{
  ts: serverTimestamp(), userId:CU.uid,
  userName:CU.displayName||CU.email, userEmail:CU.email,
  userPhoto:CU.photoURL||"", userRole:isAdmin?"admin":"user",
  action, details
});

// ── Auth ─────────────────────────────────────────────────────
const doGoogleSignIn = () => signInWithPopup(auth, new GoogleAuthProvider()).catch(e=>toast("Sign-in failed: "+e.message,"error"));
const doSignOut = () => { unsubs.forEach(u=>u()); unsubs=[]; signOut(auth); };
window.doSignOut = doSignOut;

onAuthStateChanged(auth, async user => {
  if (user) {
    CU = user;
    isAdmin = ADMIN_EMAILS.map(e=>e.toLowerCase()).includes(user.email.toLowerCase());
    renderShell();
    startListeners();
  } else {
    CU = null; isAdmin = false;
    unsubs.forEach(u=>u()); unsubs=[];
    renderAuth();
  }
});

// ── Listeners ─────────────────────────────────────────────────
function startListeners() {
  const u1 = onSnapshot(query(COL_DIR, orderBy("name")), snap => {
    directors = snap.docs.map(d=>({id:d.id,...d.data()}));
    if (!selDirId && directors.length) selDirId = directors[0].id;
    startTravelListeners();
    renderContent();
  });
  const u2 = onSnapshot(query(COL_ACT, orderBy("ts","desc"), limit(300)), snap => {
    activityLog = snap.docs.map(d=>({id:d.id,...d.data()}));
    if (curPage==="admin") renderContent();
  });
  unsubs.push(u1, u2);
}
let tUnsubs = [];
function startTravelListeners() {
  tUnsubs.forEach(u=>u());
  tUnsubs = [];
  directors.forEach(dir => {
    const u = onSnapshot(tDoc(dir.id), snap => {
      travelData[dir.id] = snap.exists() ? snap.data() : {};
      renderContent();
    });
    tUnsubs.push(u);
  });
}

// ── Director CRUD ─────────────────────────────────────────────
async function addDirector(name) {
  if (!name.trim()) return;
  const ref = doc(COL_DIR);
  await setDoc(ref, {name:name.trim(), createdAt:serverTimestamp()});
  logAct("dir_add",{dirId:ref.id, name:name.trim()});
}
async function renameDirector(id, oldName, newName) {
  if (!newName.trim()||oldName===newName.trim()) return;
  await updateDoc(doc(COL_DIR,id),{name:newName.trim()});
  logAct("dir_rename",{dirId:id,oldName,newName:newName.trim()});
}
async function deleteDirector(id, name) {
  if (!confirm(`Remove "${name}" and all their travel data?`)) return;
  await deleteDoc(doc(COL_DIR,id));
  await deleteDoc(tDoc(id));
  logAct("dir_delete",{dirId:id,name});
  if (selDirId===id) selDirId=directors.find(d=>d.id!==id)?.id||null;
}

// ── Travel data ───────────────────────────────────────────────
async function setStatus(dirId, ds, status, note) {
  const ref = tDoc(dirId);
  const snap = await getDoc(ref);
  const data = snap.exists() ? snap.data() : {};
  data[ds] = {status, note:note||""};
  await setDoc(ref, data);
  logAct("status_set",{dirId, dirName:directors.find(d=>d.id===dirId)?.name, date:ds, status, note:note||""});
}
async function clearStatus(dirId, ds) {
  const ref = tDoc(dirId);
  const snap = await getDoc(ref);
  if (!snap.exists()) return;
  const data = snap.data();
  delete data[ds];
  await setDoc(ref, data);
  logAct("status_clear",{dirId, dirName:directors.find(d=>d.id===dirId)?.name, date:ds});
}

// ── Seed (first-run) ─────────────────────────────────────────
async function seedIfNeeded() {
  const s = await getDoc(doc(db,"meta","seeded"));
  if (s.exists()) return;
  const names = ["Jawahar Gopal","Manohar Gopal","Dhiren Gopal","Lav Jawahar","Kush Jawahar","Aditya Manohar Chellaram","Arune Dhiren Chellaram","Kiren Dhiren Chellaram"];
  for (const name of names) await addDoc(COL_DIR,{name,createdAt:serverTimestamp()});
  await setDoc(doc(db,"meta","seeded"),{at:serverTimestamp()});
}

function renderNav() {

function renderContent() {
  const el = document.getElementById("maincontent"); if(!el)return;
  if (curPage==="summary")  el.innerHTML = buildSummary();
  if (curPage==="calendar") el.innerHTML = buildCalendar();
  if (curPage==="admin")    el.innerHTML = buildAdmin();

// ── SUMMARY ──────────────────────────────────────────────────
function buildSummary() {
  const today=todayDS(), d=dim(viewY,viewM), days=Array.from({length:d},(_,i)=>i+1);
  const avT=directors.filter(dr=>{const s=getEntry(dr.id,today);return !s||s.status==="available";}).length;
  const trT=directors.filter(dr=>{const s=getEntry(dr.id,today);return s&&s.status==="travelling";}).length;
  let blk=0; for(let i=1;i<=d;i++){const ds=toDS(new Date(viewY,viewM,i));const t=directors.filter(dr=>{const s=getEntry(dr.id,ds);return s&&s.status==="travelling";}).length;if(t>directors.length/2)blk++;}
  return `
  <div>
    <div class="ph">
      <div><div class="pt">Availability Summary</div><div class="ps">Monthly overview · updates live</div></div>
      ${mnav()}
    </div>
    <div class="stats">
      ${sc(directors.length,"Total Directors","#c9a84c")}
      ${sc(avT,"Available Today","#2d7d52")}
      ${sc(trT,"Travelling Today","#c0392b")}
      ${sc(blk,"Majority-Away Days","#b8860b")}
    </div>
    <div class="stbl-wrap"><div style="overflow-x:auto">
      <table class="stbl">
        <thead><tr>
          <th class="dcol">Director</th>
          ${days.map(i=>{const dt=new Date(viewY,viewM,i),w=dt.getDay()===0||dt.getDay()===6;return `<th style="opacity:${w?.55:1}">${i}<br/><span style="font-size:9px;font-weight:400">${DAYS[dt.getDay()].slice(0,2)}</span></th>`;}).join("")}
        </tr></thead>
        <tbody>
          ${directors.map(dr=>`<tr>
            <td class="dnc">${dr.name}</td>
            ${days.map(i=>{const ds=toDS(new Date(viewY,viewM,i)),e=getEntry(dr.id,ds),it=ds===today;const cls=e?e.status:"";const ic=e?(e.status==="available"?"✓":"✈"):"";return `<td title="${esc(e?.note||"")}"><span class="dc ${cls}${it?" today":""}">${ic}</span></td>`;}).join("")}
          </tr>`).join("")}
          <tr class="ar">
            <td class="dnc arlbl">AVAILABILITY</td>
            ${days.map(i=>{const ds=toDS(new Date(viewY,viewM,i));const t=directors.filter(dr=>{const s=getEntry(dr.id,ds);return s&&s.status==="travelling";}).length,n=directors.length;let bg="#2d7d52",lb="✓";if(t===n){bg="#c0392b";lb="✗";}else if(t>0){bg="#b8860b";lb=`${n-t}`;}return `<td style="padding:4px;background:#0f1f3d;text-align:center"><span class="adot" style="background:${bg}">${lb}</span></td>`;}).join("")}
          </tr>
        </tbody>
      </table>
    </div></div>
    <div class="legend">
      <div class="li"><div class="ld" style="background:#e8f5ee;border-color:#2d7d52"></div>Available</div>
      <div class="li"><div class="ld" style="background:#fdecea;border-color:#c0392b"></div>Travelling / Not Available</div>
      <div class="li"><div class="ld" style="background:#f0ebe0;border-color:#ccc"></div>No Data</div>
    </div>
  </div>`;
}

// ── CALENDAR ──────────────────────────────────────────────────
function buildCalendar() {
  const today=todayDS(), d=dim(viewY,viewM), f=fday(viewY,viewM);
  const sdir=directors.find(d=>d.id===selDirId);
  return `
  <div>
    <div class="ph">
      <div><div class="pt">Director Calendars</div><div class="ps">${isAdmin?"Click a date to update status":"View only — admin manages status"}</div></div>
      ${mnav()}
    </div>
    <div class="dtabs">${directors.map(dr=>`<button class="dtab${dr.id===selDirId?" active":""}" onclick="_sd('${dr.id}')">${dr.name}</button>`).join("")}</div>
    <div class="calwrap">
      <div class="caltop">
        <div class="caldn">${sdir?.name||"—"}</div>
        <div class="calh">${isAdmin?"✏️ Click a date to set status":"👁 View only"}</div>
      </div>
      <div class="cghdr">${DAYS.map(d=>`<div class="cdl">${d}</div>`).join("")}</div>
      <div class="cgrid">
        ${Array.from({length:f}).map(()=>"<div></div>").join("")}
        ${Array.from({length:d},(_,i)=>i+1).map(n=>{
          const ds=toDS(new Date(viewY,viewM,n)),e=getEntry(selDirId,ds),it=ds===today;
          const av=e?.status==="available",tr=e?.status==="travelling";
          return `<div class="cc${av?" available":tr?" travelling":""}${it?" today":""}${isAdmin?" clickable":""}" ${isAdmin?`onclick="_osm('${selDirId}','${ds}')"`:""}><span class="cn">${n}</span><span class="ci">${av?"✅":tr?"✈️":""}</span>${e?.note?`<span class="cn2">${e.note}</span>`:""}</div>`;
        }).join("")}
      </div>
    </div>
  </div>`;
}
window._sd = id => { selDirId=id; renderContent(); };

// ── ADMIN ─────────────────────────────────────────────────────
function buildAdmin() {
  const seen={};
  activityLog.forEach(e=>{if(!seen[e.userEmail])seen[e.userEmail]={email:e.userEmail,name:e.userName,photo:e.userPhoto,role:e.userRole};});
  const users=Object.values(seen);
  return `
  <div>
    <div class="ph"><div><div class="pt">Admin Panel</div><div class="ps">Manage directors · monitor changes · real-time</div></div></div>
    <div class="agrid">

      <div class="acard">
        <div class="ctitle">✈️ Directors <span class="chint">Click ✏️ to rename</span></div>
        ${directors.map(d=>`<div class="drow"><span class="drn">${d.name}</span><div class="drbtns"><button class="bsm edit" onclick="_orm('${d.id}','${esc(d.name)}')">✏️ Rename</button><button class="bsm danger" onclick="_dd('${d.id}','${esc(d.name)}')">Remove</button></div></div>`).join("")}
        <div class="adrow"><input class="inp" id="ndinp" placeholder="New director full name" onkeydown="if(event.key==='Enter')_ad()"/><button class="btnadd" onclick="_ad()">+ Add</button></div>
      </div>

      <div class="acard">
        <div class="ctitle">👥 Users Who've Signed In <span class="chint">Via Google</span></div>
        ${users.length===0?`<p class="empty" style="padding:20px">No users yet.</p>`:users.map(u=>`<div class="urow">${u.photo?`<img src="${u.photo}" class="uphoto"/>`:`<div class="uav">${u.name[0].toUpperCase()}</div>`}<div class="uri"><div class="urn">${u.name}</div><div class="ure">${u.email}</div></div><span class="rbadge ${u.role}">${u.role==="admin"?"👑 Admin":"👤 Viewer"}</span></div>`).join("")}
      </div>

      <div class="acard fw">
        <div class="ctitle">📋 Activity Log <span class="chint">${activityLog.length} entries · live</span></div>
        ${activityLog.length===0
          ?`<div class="empty">🗒️ No activity yet.<br/><span style="font-size:12px">All changes appear here instantly.</span></div>`
          :`<div class="alog">${activityLog.map(e=>buildLE(e)).join("")}</div>`}
      </div>

    </div>
  </div>`;
}

function buildLE(e) {
  const d=e.details||{},badges={status_set:{c:"#2d7d52",bg:"#e8f5ee",l:"Status Set"},status_clear:{c:"#888",bg:"#ede9e0",l:"Cleared"},dir_rename:{c:"#6c3483",bg:"#f5eef8",l:"Renamed"},dir_add:{c:"#b8860b",bg:"#fef9e7",l:"Added"},dir_delete:{c:"#c0392b",bg:"#fdecea",l:"Deleted"}};
  const b=badges[e.action]||{c:"#888",bg:"#eee",l:e.action};
  let txt="";
  if(e.action==="status_set")   txt=`marked <b>${d.dirName}</b> as <b>${d.status==="available"?"✅ Available":"✈️ Travelling"}</b> on <b>${fmtD(d.date)}</b>${d.note?` — <i>"${d.note}"</i>`:""}`;
  else if(e.action==="status_clear") txt=`cleared status for <b>${d.dirName}</b> on <b>${fmtD(d.date)}</b>`;
  else if(e.action==="dir_rename")   txt=`renamed director <b>${d.oldName}</b> → <b>${d.newName}</b>`;
  else if(e.action==="dir_add")      txt=`added director <b>${d.name}</b>`;
  else if(e.action==="dir_delete")   txt=`removed director <b>${d.name}</b>`;
  return `<div class="litem">${e.userPhoto?`<img src="${e.userPhoto}" class="lav"/>`:`<div class="lavt${e.userRole==="admin"?" isa":""}">${e.userName[0].toUpperCase()}</div>`}<div class="lbody"><div class="ltxt"><b>${e.userName}</b> ${txt}</div><div class="lmeta"><span class="lbadge" style="color:${b.c};background:${b.bg}">${b.l}</span><span>${e.ts?fmtT(e.ts):"just now"}</span><span style="color:${e.userRole==="admin"?"#b8860b":"#6b7280"}">${e.userRole==="admin"?"👑 Admin":"👤 User"}</span><span>${e.userEmail}</span></div></div></div>`;
}

// ── Modal helpers ─────────────────────────────────────────────
window._osm = (dirId, ds) => {
  if (!isAdmin) return;
  const e = getEntry(dirId, ds), dir = directors.find(d => d.id === dirId);
  modalSt = { dirId, ds, sel: e?.status || null };

  document.getElementById("modlayer").innerHTML = `
  <div class="ov" id="ov">
    <div class="mod">
      <div class="mtitle">${dir?.name}</div>
      <div class="msub">${new Date(ds + "T00:00:00").toLocaleDateString("en-IN", {weekday:"long",day:"numeric",month:"long",year:"numeric"})}</div>
      <div class="scgrid">
        <div class="sc${e?.status === "available" ? " sav" : ""}" id="scav">
          <div class="sci">✅</div><div>Available</div><div class="scs">In Office / Reachable</div>
        </div>
        <div class="sc${e?.status === "travelling" ? " str" : ""}" id="sctr">
          <div class="sci">✈️</div><div>Travelling</div><div class="scs">Away / Not Available</div>
        </div>
      </div>
      <div class="fg">
        <label class="flbl">Note (optional)</label>
        <input class="inp" id="tnote" placeholder="e.g. Singapore Conference, NYC Board Meeting" value="${esc(e?.note || "")}"/>
      </div>
      <div class="mactions">
        <button class="bcx" id="mbtn-cancel">Cancel</button>
        ${e ? `<button class="bdg" id="mbtn-clear">Clear</button>` : ""}
        <button class="bsv" id="mbtn-save">Save</button>
      </div>
    </div>
  </div>`;

  // Attach events after innerHTML renders - reliable inside ES modules
  document.getElementById("scav").addEventListener("click", () => _ps("available"));
  document.getElementById("sctr").addEventListener("click", () => _ps("travelling"));
  document.getElementById("mbtn-cancel").addEventListener("click", _cm);
  document.getElementById("mbtn-save").addEventListener("click", _sv);
  document.getElementById("ov").addEventListener("click", ev => { if (ev.target.id === "ov") _cm(); });
  const clrBtn = document.getElementById("mbtn-clear");
  if (clrBtn) clrBtn.addEventListener("click", _cs);
};
window._ps = s => {
  modalSt.sel=s;
  document.getElementById("scav").className="sc"+(s==="available"?" sav":"");
  document.getElementById("sctr").className="sc"+(s==="travelling"?" str":"");
};
window._sv = async () => {
  // Read all values from DOM BEFORE _cm() destroys the modal
  const sel = modalSt.sel;
  if (!sel) return toast("Please select a status","error");
  const note = document.getElementById("tnote")?.value?.trim() || "";
  const dirId = modalSt.dirId;
  const ds = modalSt.ds;
  _cm(); // close modal AFTER reading values
  await setStatus(dirId, ds, sel, note);
  toast("Status saved!");
};
window._cs = async () => {
  const dirId = modalSt.dirId;
  const ds = modalSt.ds;
  _cm();
  await clearStatus(dirId, ds);
  toast("Status cleared.");
};
window._cm = () => { document.getElementById("modlayer").innerHTML=""; };

window._orm = (id, name) => {
  document.getElementById("modlayer").innerHTML = `
  <div class="ov" id="rov">
    <div class="mod" style="width:400px">
      <div class="mtitle">Rename Director</div>
      <div class="msub">Current name: ${name}</div>
      <div class="fg">
        <label class="flbl">New Name</label>
        <input class="inp" id="rinp" value="${name}"/>
      </div>
      <div class="mactions">
        <button class="bcx" id="rbtn-cancel">Cancel</button>
        <button class="bsv" id="rbtn-save">Save Name</button>
      </div>
    </div>
  </div>`;
  const rinp = document.getElementById("rinp");
  document.getElementById("rbtn-cancel").addEventListener("click", _cm);
  document.getElementById("rbtn-save").addEventListener("click", () => _rn(id, name));
  rinp.addEventListener("keydown", ev => { if (ev.key === "Enter") _rn(id, name); });
  document.getElementById("rov").addEventListener("click", ev => { if (ev.target.id === "rov") _cm(); });
  setTimeout(() => rinp?.focus(), 60);
};
window._rn = async (id, oldName) => {
  const v = document.getElementById("rinp")?.value?.trim() || "";
  _cm();
  if (!v) return;
  await renameDirector(id, oldName, v);
  toast("Director renamed!");
};
window._dd = (id, name) => deleteDirector(id, name);
window._ad = async () => {
  const v=document.getElementById("ndinp")?.value?.trim();
  if(!v) return;
  await addDirector(v);
  document.getElementById("ndinp").value="";
  toast("Director added!");
};

// ── Shared component helpers ──────────────────────────────────
function mnav() {
  return `<div class="mnav"><button class="mbtn" onclick="_cm2(-1)">‹</button><div class="mlbl">${mLbl(viewY,viewM)}</div><button class="mbtn" onclick="_cm2(1)">›</button></div>`;
}
window._cm2 = d => { viewM+=d; if(viewM>11){viewM=0;viewY++;}if(viewM<0){viewM=11;viewY--;} renderContent(); };
function sc(val,lbl,accent) { return `<div class="scard" style="border-left:4px solid ${accent}"><div class="sv">${val}</div><div class="sl">${lbl}</div></div>`; }
</script>
